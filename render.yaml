services:
  - type: web
    name: whatsapp-agent
    runtime: python
    buildCommand: pip install poetry && poetry install
    startCommand: poetry run python run.py
    healthCheckPath: /health

    envVars:
      - key: ENV
        value: production
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001

      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHATSAPP_PROVIDER       # set to "twilio" to test, "meta" for prod
        value: meta
      - key: WHATSAPP_ACCESS_TOKEN   # Meta Cloud API
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN   
        sync: false
      - key: MERCHANT_PHONE         
        sync: false
      - key: BUSINESS_NAME
        sync: false
      - key: BUSINESS_CITY
        sync: false

      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

      - key: MOMO_SUBSCRIPTION_KEY
        value: placeholder
      - key: MOMO_API_USER
        value: placeholder
      - key: MOMO_API_KEY
        value: placeholder
      - key: MOMO_CALLBACK_URL
        value: placeholder
